<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Reading Awaits...</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Tarot BG particles -->
  <div class="particles" id="particles"></div>

  <!-- Blurred background overlay -->
  <div class="bg-blur"></div>

  <!-- 3D Login Card -->
  <div class="scene">
    <div class="card" id="loginCard">
      <div class="card-inner">

        <div class="card-header">
          <div class="tarot-eye">
          <svg viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg" class="soul-svg">
            <!-- Rays emanating upward -->
            <line x1="30" y1="30" x2="30" y2="2"  stroke="#c9a84c" stroke-width="1.5" opacity="0.9"/>
            <line x1="30" y1="30" x2="14" y2="8"  stroke="#c9a84c" stroke-width="1.2" opacity="0.7"/>
            <line x1="30" y1="30" x2="46" y2="8"  stroke="#c9a84c" stroke-width="1.2" opacity="0.7"/>
            <line x1="30" y1="30" x2="4"  y2="20" stroke="#c9a84c" stroke-width="1"   opacity="0.45"/>
            <line x1="30" y1="30" x2="56" y2="20" stroke="#c9a84c" stroke-width="1"   opacity="0.45"/>
            <!-- Glowing orb / soul -->
            <circle cx="30" cy="30" r="10" fill="none" stroke="#f0d080" stroke-width="1.5" opacity="0.6"/>
            <circle cx="30" cy="30" r="6"  fill="rgba(201,168,76,0.25)"/>
            <circle cx="30" cy="30" r="3"  fill="#f0d080" opacity="0.95"/>
            <!-- Ascending figure (simple) -->
            <path d="M30 42 Q24 52 26 62 Q30 58 34 62 Q36 52 30 42Z" fill="rgba(201,168,76,0.35)" stroke="#c9a84c" stroke-width="0.8"/>
            <line x1="30" y1="42" x2="30" y2="78" stroke="#c9a84c" stroke-width="1" opacity="0.3" stroke-dasharray="2,3"/>
          </svg>
        </div>
          <h1 class="title">The LIFE PATH</h1>
          <p class="subtitle">Enter the cipher to reveal your fate</p>
        </div>

        <div class="input-group">
          <input
            type="text"
            id="passwordInput"
            class="cipher-input"
            placeholder="_ - _ - _ - _ - _ - _ - _ - _"
            autocomplete="off"
            spellcheck="false"
          />
          <div class="input-glow"></div>
        </div>

        <div class="error-msg" id="errorMsg">✦ The cards reject this cipher ✦</div>

        <button class="reveal-btn" id="revealBtn" onclick="checkPassword()">
          <span class="btn-text">Reveal**</span>
          <span class="btn-shimmer"></span>
        </button>

        <p class="hint-text">The answer lies within the story... </p>
        <p class="hint-text"> **(if cipher is ABCDE  type as A-B-C-D-E) </p>

      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
